name: Release

# Build + publish to PyPI on a version tag:
#   * peclet-flow      — sdist + self-contained OpenMP CPU wheels (FetchContent Kokkos OpenMP+Serial,
#                        PECLET_VENDOR_DEPS=ON from [tool.cibuildwheel]).
#   * peclet-flow-cu13 — single-GPU CUDA wheels (cuda-wheel job): Kokkos-CUDA (static, embedded) built
#                        against CUDA 13; libcudart comes from the `nvidia-cuda-runtime` dependency wheel
#                        (rpath, -DPECLET_CUDA_RUNTIME_WHEEL=ON), not bundled. HIP + multi-GPU MPI stay
#                        source/container.
# Uses PyPI Trusted Publishing (OIDC): register the publisher for BOTH `peclet-flow` AND `peclet-flow-cu13`
# on PyPI first (one publisher per project) — no API token secret needed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: wheels (manylinux_2_28 x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # cibuildwheel reads [tool.cibuildwheel] from pyproject.toml (PECLET_VENDOR_DEPS=ON): each wheel
      # compiles Kokkos as a subproject, so builds are slow but self-contained.
      - uses: pypa/cibuildwheel@v2.21
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  # peclet-flow-cu13: single-GPU CUDA wheels. Runs in a manylinux_2_28 container (so the output is a
  # PyPI-uploadable manylinux wheel), installs the CUDA toolkit, builds a Kokkos-CUDA prefix ONCE, then
  # builds + repairs the flow wheel for each supported CPython. libcudart is NOT bundled — it is supplied
  # by the `nvidia-cuda-runtime` runtime wheel (declared in packaging/pyproject-cuda.toml) and reached via
  # the module rpath baked by -DPECLET_CUDA_RUNTIME_WHEEL=ON.
  cuda-wheel:
    name: cuda wheels (peclet-flow-cu13, manylinux_2_28 x86_64)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    env:
      KOKKOS_TAG: "5.1.1"
      # SASS baseline = the lowest arch the pinned CUDA supports; PTX carries the fatbin forward to newer
      # GPUs by JIT (so one wheel runs Turing..Blackwell). Bump/extend if the CUDA floor moves. (KOKKOS_ARCH
      # name must match CUDA_ARCH number: TURING75/75, AMPERE80/80, HOPPER90/90, BLACKWELL120/120.)
      KOKKOS_ARCH: "TURING75"
      CUDA_ARCH: "75"
      CUDA_PKG: "13-2"          # CUDA toolkit package suffix (cuda-nvcc-13-2 …)
      CUDA_HOME: "/usr/local/cuda-13.2"
    steps:
      - uses: actions/checkout@v7

      - name: Install CUDA toolkit (nvcc + cudart devel)
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          dnf -y install cuda-nvcc-${CUDA_PKG} cuda-cudart-devel-${CUDA_PKG} cuda-crt-${CUDA_PKG} cuda-nvml-devel-${CUDA_PKG}
          echo "${CUDA_HOME}/bin" >> "$GITHUB_PATH"

      - name: Build Kokkos-CUDA prefix (static; embedded in the module)
        run: |
          export PATH="${CUDA_HOME}/bin:$PATH"
          git clone --depth 1 --branch "${KOKKOS_TAG}" https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kokkos/build \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/kokkos-cuda" \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER=/tmp/kokkos/bin/nvcc_wrapper \
            -DKokkos_ENABLE_CUDA=ON -DKokkos_ENABLE_SERIAL=ON \
            "-DKokkos_ARCH_${KOKKOS_ARCH}=ON" -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCH}"
          cmake --build /tmp/kokkos/build --target install -j

      - name: Build + repair CUDA wheels (cp310–cp313)
        run: |
          export PATH="${CUDA_HOME}/bin:$PATH"
          export CMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/kokkos-cuda"
          cp packaging/pyproject-cuda.toml pyproject.toml   # -> peclet-flow-cu13 + nvidia-cuda-runtime dep
          mkdir -p /tmp/raw /tmp/out
          for PY in cp310-cp310 cp311-cp311 cp312-cp312 cp313-cp313; do
            "/opt/python/${PY}/bin/pip" wheel . --no-deps -w /tmp/raw
          done
          # Retag to manylinux (libcudart/libcuda are external: excluded), then re-add the nvidia rpath
          # auditwheel resets, so `import peclet.flow` finds libcudart in the nvidia-cuda-runtime wheel.
          /opt/python/cp312-cp312/bin/pip install -q auditwheel wheel
          for whl in /tmp/raw/*.whl; do
            /opt/python/cp312-cp312/bin/auditwheel repair \
              --exclude libcudart.so.13 --exclude libcuda.so.1 \
              --plat manylinux_2_28_x86_64 -w /tmp/rep "$whl"
          done
          for whl in /tmp/rep/*.whl; do
            work=$(mktemp -d)
            ( cd "$work" && /opt/python/cp312-cp312/bin/python -m wheel unpack "$whl" )
            pkg=$(ls -d "$work"/*/)
            patchelf --add-rpath '$ORIGIN/../../nvidia/cu13/lib'    "$pkg"peclet/flow/_flow*.so
            patchelf --add-rpath '$ORIGIN/../../../nvidia/cu13/lib' "$pkg"peclet/flow/pnm/_pnm*.so
            ( cd "$work" && /opt/python/cp312-cp312/bin/python -m wheel pack "$pkg" -d /tmp/out )
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-cuda
          path: /tmp/out/*.whl

  publish:
    needs: [sdist, wheels, cuda-wheel]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Uploads both peclet-flow (sdist + CPU wheels) and peclet-flow-cu13 (CUDA wheels); PyPI routes each
      # file by its metadata name. Both projects must have this workflow registered as a trusted publisher.
      - uses: pypa/gh-action-pypi-publish@release/v1
